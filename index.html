<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOA KIM | Urban Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="custom-cursor"></div>

    <header>
        <a href="#" class="logo">BOA.URBAN</a>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="#projects">WORKS</a>
            <a href="#contact">CONTACT</a>
            <button id="theme-toggle">DARK</button>
        </nav>
    </header>

    <main>
        <!-- About Section (Intro) -->
        <section id="about">
            <h2>안녕하세요, <span class="highlight">김보아</span>입니다.</h2>
            <p>도시공학을 전공하며 지속 가능한 도시 환경과 보행자 중심의 공간 설계를 연구합니다. 단순한 물리적 구조를 넘어, 그 속에 살아가는 사람들의 행복을 디자인하는 도시설계가를 목표로 합니다.</p>
        </section>

        <!-- Projects Section -->
        <section id="projects">
            <h2>PROJECTS.</h2>
            <div class="project-grid">
                <project-card name="Green Corridor" description="도심 내 방치된 선형 공간을 활용한 미세먼지 저감 녹지 축 설계 프로젝트"></project-card>
                <project-card name="Smart Mobility Hub" description="퍼스널 모빌리티와 대중교통의 유기적 결합을 통한 복합 환승 거점 공간 계획"></project-card>
                <project-card name="Pedestrian First" description="기존 차도 중심의 가로 환경을 보행자 중심의 문화 거리로 재구성한 도시 재생 프로젝트"></project-card>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact">
            <h2>CONTACT.</h2>
            <form action="https://formspree.io/f/mqeydbkg" method="POST">
                <div class="form-group">
                    <label for="name">NAME</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@city.com">
                </div>
                <div class="form-group">
                    <label for="message">MESSAGE</label>
                    <textarea id="message" name="message" rows="4" required placeholder="How can I help you?"></textarea>
                </div>
                <button type="submit" class="submit-btn">SEND MESSAGE</button>
            </form>
        </section>

        <section id="comments">
            <h2>COMMENTS.</h2>
            <div id="utterances-container"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 BOA KIM | URBAN ENGINEERING. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
