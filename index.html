
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김보아 | 대학생 포트폴리오</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>김보아</h1>
        <p>대학생</p>
        <button id="theme-toggle">다크 모드</button>
    </header>

    <main>
        <section id="about">
            <h2>소개</h2>
            <p>안녕하세요! 저는 현재 OO대학교에 재학 중인 김보아입니다. 창의적인 문제 해결과 새로운 기술 학습에 대한 열정을 가지고 있습니다.</p>
        </section>

        <section id="projects">
            <h2>프로젝트</h2>
            <project-card name="프로젝트 1" description="첫 번째 프로젝트에 대한 설명입니다."></project-card>
            <project-card name="프로젝트 2" description="두 번째 프로젝트에 대한 설명입니다."></project-card>
        </section>

        <section id="skills">
            <h2>기술</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </section>

        <section id="contact">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mqeydbkg" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" required placeholder="문의 내용을 입력해주세요"></textarea>
                </div>
                <button type="submit" class="submit-btn">보내기</button>
            </form>
            <p class="contact-info">이메일: boa.kim@example.com</p>
        </section>

        <section id="comments">
            <h2>댓글</h2>
            <div id="utterances-container"></div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
